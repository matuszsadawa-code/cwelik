version: "3.9"

services:
  # ──────────────────────────────────────────────
  # Backend — FastAPI / uvicorn
  # ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: production
    image: openclaw-backend:latest
    container_name: openclaw-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/db/trading_system.db
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      # Persist SQLite database across container restarts
      - db_data:/app/db
      # Mount logs directory
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────────
  # Frontend — placeholder (uncomment when ready)
  # ──────────────────────────────────────────────
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   image: openclaw-frontend:latest
  #   container_name: openclaw-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
