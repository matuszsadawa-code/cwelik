# Production docker-compose override for OpenClaw Trading Dashboard
# Usage: docker-compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d

version: "3.9"

services:
  backend:
    restart: always
    # Remove dev volume mounts; only persist database and logs
    volumes:
      - db_data:/app/db
      - logs_data:/app/logs
    environment:
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_RELOAD=false
      - ENFORCE_HTTPS=true
      - CORS_ORIGINS=https://your-domain.com
      - LOG_LEVEL=INFO
    # Do not expose port directly — Nginx handles ingress
    ports: []

  nginx:
    image: nginx:1.25-alpine
    container_name: openclaw-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy

  certbot:
    image: certbot/certbot:latest
    container_name: openclaw-certbot
    restart: unless-stopped
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renew certificates twice daily; exits immediately if not due
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  db_data:
    driver: local
  logs_data:
    driver: local
  certbot_webroot:
    driver: local
  certbot_certs:
    driver: local
